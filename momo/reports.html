<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMOHUB - Reports</title>
    <style>
        /* CSS Y'URUPAPURO RWA REPORTS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color:#0a192f;
            color: #333;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            color: #FFCC00; /* Dark Blue ihuje na sidebar */
            font-size: 26px;
        }

        /* Uturanga-gihe (Filters) */
        .filter-section {
            background: #061120;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px #061120;
            margin-bottom: 30px;
            border: 1px solid #061120;
        }

        .filter-grid {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: white;
        }

        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #061120;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            background: #4b6486;
        }

        .btn-filter {
            background: #1a237e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            height: 41px;
            transition: 0.2s;
        }

        .btn-filter:hover {
            background: #0d1342;
        }

        /* Udusanduku tw'imibare (Summary Cards) */
        .analytics-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #061120;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid #1a237e;
        }

        .card h3 {
            font-size: 14px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
            color: #1a237e;
        }

        /* IMBONERAHAMWE YA RAPORO */
        .table-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .report-table th {
            background-color: #1a237e;
            color: white;
            padding: 15px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .report-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .report-table tr:hover {
            background-color: #f8f9fa;
        }

        .text-success { color: #2e7d32; font-weight: bold; }
        .text-danger { color: #c62828; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="page-header">
            <h2>Raporo (Reports & Analytics)</h2>
        </div>

        <!-- AGASANDUKU KO GUSHUNGURA RAPORO -->
        <div class="filter-section">
            <div class="filter-grid">
                <div class="form-group">
                    <label>Itariki Itangira (From)</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>Itariki Isoza (To)</label>
                    <input type="date" id="endDate">
                </div>
                <div class="form-group">
                    <label>Ubwoko (Type)</label>
                    <select id="reportType">
                        <option value="all">Byose</option>
                        <option value="income">Amafaranga Yinjiye</option>
                        <option value="expense">Amafaranga Asohotse</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="shunguraRaporo()">Shaka Raporo</button>
            </div>
        </div>

        <!-- UTUDUSANDUKU TW'IMIBARE -->
        <div class="analytics-cards">
            <div class="card">
                <h3>Amafaranga Yinjiye (Total Income)</h3>
                <p id="totalIncome">0 RWF</p>
            </div>
            <div class="card">
                <h3>Amafaranga Asohotse (Total Expenses)</h3>
                <p id="totalExpenses">0 RWF</p>
            </div>
            <div class="card">
                <h3>Inyungu Isigaye (Net Profit)</h3>
                <p id="netProfit">0 RWF</p>
            </div>
        </div>

        <!-- IMBONERAHAMWE Y'AMAKURU YA RAPORO -->
        <div class="table-container">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Itariki</th>
                        <th>Ubusobanuro</th>
                        <th>Ubwoko</th>
                        <th>Umukiriya / Plainte</th>
                        <th>Amafaranga</th>
                    </tr>
                </thead>
                <tbody id="report-rows">
                    <!-- Hano amakuru aturuka kuri Database azajya yijyamo binyuze kuri JS -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        const reportRows = document.getElementById("report-rows");

        // ==============================================================
        // 1. KUZANA AMAKURU YA RAPORO (FETCH REPORTS FROM PHP/SQL)
        // ==============================================================
        function zanaRaporoKuriDatabase() {
            const startDate = document.getElementById("startDate").value;
            const endDate = document.getElementById("endDate").value;
            const reportType = document.getElementById("reportType").value;

            /* 
               HANO HAZAJYA PHP: (Gusoma amakuru muri SQL ukoresheje amatariki na filter type)
               fetch(`get_reports.php?start=${startDate}&end=${endDate}&type=${reportType}`)
               .then(response => response.json())
               .then(data => {
            */
            
            // Ifomu y'uburyo amakuru azaba ameze naza (Urugero rw'ubusa butarimo data):
            const reports = []; // Izaba irimo urutonde rwa raporo ruva kuri Database
            
            reportRows.innerHTML = "";
            let incomeSum = 0;
            let expenseSum = 0;

            reports.forEach(item => {
                // Kubara amafaranga yinjiye n'asohotse
                if (item.type === "Income") {
                    incomeSum += item.amount;
                } else {
                    expenseSum += item.amount;
                }

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.date}</td>
                    <td>${item.description}</td>
                    <td>${item.type}</td>
                    <td>${item.client}</td>
                    <td class="${item.type === 'Income' ? 'text-success' : 'text-danger'}">
                        ${item.type === 'Income' ? '+' : '-'}${item.amount} RWF
                    </td>
                `;
                reportRows.appendChild(row);
            });

            // Gushyira imibare yose mu tudusanduku twa hejuru
            document.getElementById("totalIncome").textContent = incomeSum + " RWF";
            document.getElementById("totalExpenses").textContent = expenseSum + " RWF";
            document.getElementById("netProfit").textContent = (incomeSum - expenseSum) + " RWF";

            /* 
               }) 
            */
        }

        // Guhita yizana iyo page ikimara gufunguka
        window.onload = zanaRaporoKuriDatabase;

        // Iyo umuntu akanze buto yo gushungura
        function shunguraRaporo() {
            zanaRaporoKuriDatabase();
        }
    </script>
</body>
</html>
